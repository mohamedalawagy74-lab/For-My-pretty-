<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مفاجأة لدعاء ❤️</title>
</head>
<body style="background:#0f0c1b; color:white; text-align:center; font-family:sans-serif;">
    <h1 style="margin-top:100px;">أهلاً يا دعاء ❤️</h1>
    <input type="text" id="pass" placeholder="دخلي التاريخ يا قمر" style="padding:10px;">
    <button onclick="check()" style="padding:10px;">دخول</button>
    
    <div id="content" style="display:none; margin-top:50px;">
        <h2>أغنية ليكِ يا دعاء ❤️</h2>
        <iframe width="300" height="200" src="https://www.youtube.com/embed/uS3o1fBqH9k"></iframe>
    </div>

    <script>
        function check() {
            if(document.getElementById('pass').value == "16/6/2003") {
                document.getElementById('content').style.display = 'block';
            } else { alert("غلط!"); }
        }
    </script>
</body>
</html>
